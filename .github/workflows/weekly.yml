name: Weekly Gaming News

on:
  schedule:
    - cron: '0 21 * * 0'  # 周一 05:00 北京时间 → 起床前报告就绪 → 傍晚发布
    - cron: '0 21 * * 3'  # 周四 05:00 北京时间 → 起床前报告就绪 → 傍晚发布
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-news:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Pull latest
        run: git pull --rebase origin master

      - name: Run news pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          PYTHONIOENCODING: utf-8
          NEWS_WINDOW_DAYS: 4
          BILIBILI_BROWSER: true
          BILIBILI_SESSDATA: ${{ secrets.BILIBILI_SESSDATA }}
          # GAME_DEALS: true   # 取消注释以追加折扣表格
        run: python main.py

      - name: Commit and push output
        run: |
          git config user.name "gaming-news-bot"
          git config user.email "bot@gaming-news.local"
          git add output/
          git stash
          git pull --rebase origin master
          git stash pop || true
          git add output/
          HALF=$(python3 -c "import datetime; wd=datetime.datetime.now(datetime.timezone.utc).weekday(); print('下' if wd<=2 else '上')")
          LABEL="$(date +%G-W%V)-${HALF}"
          git diff --staged --quiet || git commit -m "${LABEL} semi-weekly report"
          git push
