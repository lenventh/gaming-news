name: Weekly Gaming News

on:
  schedule:
    - cron: '0 21 * * 4'  # 周五 05:00 北京 → 周六发布
    - cron: '0 21 * * 0'  # 周一 05:00 北京 → 周二发布
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  generate-news:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Pull latest
        run: git pull --rebase origin master

      - name: Run news pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          PYTHONIOENCODING: utf-8
          NEWS_WINDOW_DAYS: 4
          BILIBILI_BROWSER: true
          BILIBILI_SESSDATA: ${{ secrets.BILIBILI_SESSDATA }}
          BILIBILI_IMAGE_RECOGNITION: true  # qwen-vl-max 识别官方动态图片
          # ENRICH_VIDEO_CONTENT: true  # 开启字幕提取(已验证70/100可用)
          # GAME_DEALS: true   # 取消注释以追加折扣表格
        run: python main.py

      - name: 检测 SESSDATA 过期并创建提醒 Issue
        if: always()  # 即使管道部分失败也检查
        run: |
          if [ -f sessdata_expired.flag ]; then
            echo "检测到 SESSDATA 已过期，创建提醒 Issue..."
            gh issue create \
              --title "⚠️ B站 SESSDATA 已过期 — 请更新 Cookie" \
              --body "$(cat <<'ISSUEBODY'
          ## 🔴 B站 SESSDATA Cookie 已过期

          本期周刊的 B站 专栏/动态采集因 Cookie 过期而返回 0 条内容。

          ### 你需要做什么

          1. 本地运行提取脚本：
             ```
             python extract_sessdata.py
             ```
          2. 在浏览器中登录 B站（扫码/账号密码）
          3. 脚本会自动提取 SESSDATA 值
          4. 将新值更新到 GitHub Secrets：
             → https://github.com/lenventh/gaming-news/settings/secrets/actions
             → 找到 `BILIBILI_SESSDATA` → 更新

          ### 影响

          - B站 专栏/动态/UP主空间 采集量为 0
          - 周刊国内资讯中 B站 来源将缺失
          - 其他采集源（RSS/Google News）不受影响

          > 🤖 此 Issue 由 CI 自动创建
          ISSUEBODY
          )" \
              --label "cookie-过期" \
              --label "需要操作"
            rm -f sessdata_expired.flag
            echo "✅ 提醒 Issue 已创建"
          else
            echo "✅ SESSDATA 状态正常"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit and push output
        run: |
          git config user.name "gaming-news-bot"
          git config user.email "bot@gaming-news.local"
          git add output/
          git stash
          git pull --rebase origin master
          git stash pop || true
          git add output/
          HALF=$(python3 -c "import datetime; wd=datetime.datetime.now(datetime.timezone.utc).weekday(); print({3:'上',6:'下'}.get(wd,'上'))")
          LABEL="$(date +%G-W%V)-${HALF}"
          git diff --staged --quiet || git commit -m "${LABEL} semi-weekly report"
          git push
