name: Weekly Gaming News

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start RSSHub (B站/贴吧/国内源代理)
        run: |
          git clone --depth 1 https://github.com/DIYgod/RSSHub.git /tmp/rsshub
          cd /tmp/rsshub
          npm install --production 2>&1 | tail -1
          node lib/index.js --port 1200 &
          for i in $(seq 1 30); do
            if curl -s http://localhost:1200/test/cache > /dev/null 2>&1; then
              echo "RSSHub ready"
              break
            fi
            echo "Waiting for RSSHub... ($i)"
            sleep 2
          done

      - name: Run news pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          PYTHONIOENCODING: utf-8
          NEWS_WINDOW_DAYS: 7
        run: python main.py

      - name: Commit and push output
        run: |
          git config user.name "gaming-news-bot"
          git config user.email "bot@gaming-news.local"
          git add output/
          git diff --staged --quiet || git commit -m "$(date +%G-W%V) weekly report"
          git push
